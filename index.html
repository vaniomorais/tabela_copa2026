<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tabela de classificação, jogos e chaveamento da Copa do Mundo 2026">
  <title>Tabela Copa 2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f7a3b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tabela Copa 2026">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>⚽ Copa do Mundo 2026</h1>
      <p>Acompanhe os jogos, registre resultados e visualize o chaveamento.</p>
      <div class="menu-app">
        <button id="btnMenuApp" class="btn-menu-app" aria-label="Abrir menu de opções">
          ☰
        </button>

        <div id="opcoesMenuApp" class="opcoes-menu-app">
            <button id="btnExportarDados" type="button">📤 Exportar backup</button>
            <button id="btnImportarDados" type="button">📥 Importar backup</button>
            <button id="btnAlternarTema" type="button">🌙 Modo escuro</button>
            <button id="btnConsultarResultados" type="button">🔎 Consultar Resultados</button>
            <button id="btnResetarTorneio" type="button" class="opcao-perigo">🗑️ Limpar resultados</button>

            <input type="file" id="inputImportarBackup" accept=".json" style="display:none;">
        </div>
      </div>
    </div>
  </header>

  <nav class="fase-controle" aria-label="Controle de fases da competição">
    <button id="btnFaseAnterior" type="button" onclick="mudarFase(-1)" class="btn-fase" aria-label="Ir para a fase anterior">← Fase Anterior</button>
    <h2 id="faseTitulo">Fase de Grupos</h2>
    <button id="btnFaseProxima" type="button" onclick="mudarFase(1)" class="btn-fase" aria-label="Ir para a próxima fase">Próxima Fase →</button>
  </nav>

  <main class="container" role="main">
    <section class="grupos" id="grupos" aria-labelledby="tituloGrupos">
      <div class="classification-header">
        <h2 id="tituloGrupos">📊 Classificação por Grupo</h2>
        
        <div class="legenda-classificacao">
          <span><i class="legenda-cor classificado"></i> Classificado</span>
          <span><i class="legenda-cor eliminado"></i> Eliminado</span>
        </div>
      </div>
      <div id="gruposContainer"></div>
    </section>

    <aside class="painel-lateral" aria-label="Painel de jogos da fase de grupos">
      <section class="jogos" aria-labelledby="rodadaTitulo">
        <div class="rodada-header">
          <button id="btnRodadaAnterior" type="button" class="btn-navegar" aria-label="Rodada anterior">← Anterior</button>
          <h2 id="rodadaTitulo">📅 Rodada 1</h2>
          <button id="btnRodadaProxima" type="button" class="btn-navegar" aria-label="Próxima rodada">Próxima →</button>
        </div>
        <div id="jogosList" class="lista-jogos" aria-live="polite"></div>
      </section>
    </aside>
  </main>

  <section id="faseMataMata" class="fase-mata-mata" hidden aria-labelledby="faseTitulo">
    <div id="chaveamentoContainer" class="grid-mata-mata"></div>
  </section>

  <section id="resumoFinal" class="resumo-final" style="display: none;"></section>

  <footer class="footer">
    <p>&copy; 2026 Tabela Copa do Mundo | Dev jVSM iNC</p>
  </footer>

  <script src="fifa_combinations.js"></script>
  <script src="conbinacoes-fifa.js"></script>
  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => {
          console.log('✅ Service Worker registrado com sucesso');

          // Verifica atualizações a cada 5 minutos
          setInterval(() => {
            console.log('🔍 Verificando atualizações do Service Worker...');
            reg.update();
          }, 5 * 60 * 1000);

          // Se já houver uma versão em waiting
          if (reg.waiting) {
            console.log('📦 Versão em waiting detectada');
            showUpdateNotification(reg);
          }

          // Detecta quando um novo SW é encontrado
          reg.addEventListener('updatefound', () => {
            console.log('🆕 Novo Service Worker encontrado');
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              console.log('📊 Estado do novo SW:', newWorker.state);
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('⏳ Novo SW instalado, mostrando notificação');
                showUpdateNotification(reg);
              }
            });
          });

          // Recarrega a página quando o SW assume o controle
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('🔄 Novo Service Worker ativado, recarregando...');
            window.location.reload();
          });
        })
        .catch(error => console.error('❌ Erro ao registrar SW:', error));
    });
  }

  function showUpdateNotification(reg) {
    // Verifica se a notificação já existe para evitar duplicação
    const existente = document.getElementById('update-notification');
    if (existente) {
      console.log('⚠️ Notificação de atualização já está visível');
      return;
    }

    console.log('✨ Exibindo notificação de atualização');
    const updateMsg = document.createElement('div');
    updateMsg.id = 'update-notification';
    
    updateMsg.innerHTML = `
      <span>🔄 <strong>Nova versão disponível!</strong></span>
      <div>
        <button id="btnAtualizarAgora">Atualizar</button>
        <button id="btnAdiarUpdate">Depois</button>
      </div>
    `;

    document.body.appendChild(updateMsg);
    console.log('✅ Notificação de atualização adicionada ao DOM');

    const btnAtualizar = document.getElementById('btnAtualizarAgora');
    const btnAdiar = document.getElementById('btnAdiarUpdate');

    // Auto-remove depois de 15 segundos se o usuário não interagir
    const timeoutRemove = setTimeout(() => {
      console.log('⏰ Notificação expirada por timeout');
      if (updateMsg.parentNode) {
        updateMsg.style.animation = 'slideDown 0.3s ease-out forwards';
        setTimeout(() => updateMsg.remove(), 300);
      }
    }, 15000);

    btnAtualizar.addEventListener('click', () => {
      console.log('✅ Usuário clicou em "Atualizar"');
      clearTimeout(timeoutRemove);
      updateMsg.innerHTML = '<span style="flex: 1;">⏳ Atualizando...</span>';
      updateMsg.style.pointerEvents = 'none';
      
      if (reg.waiting) {
        console.log('📤 Enviando SKIP_WAITING para o Service Worker');
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        
        // Aguarda antes de remover para garantir que a atualização foi processada
        setTimeout(() => {
          if (updateMsg.parentNode) updateMsg.remove();
        }, 2500);
      } else {
        setTimeout(() => {
          if (updateMsg.parentNode) updateMsg.remove();
        }, 500);
      }
    });

    btnAdiar.addEventListener('click', () => {
      console.log('⏭️ Usuário clicou em "Depois"');
      clearTimeout(timeoutRemove);
      updateMsg.style.animation = 'slideDown 0.3s ease-out forwards';
      setTimeout(() => {
        if (updateMsg.parentNode) updateMsg.remove();
      }, 300);
    });
  }
</script>
</body>
</html>
