<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tabela de classificação, jogos e chaveamento da Copa do Mundo 2026">
  <title>Tabela Copa 2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f7a3b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tabela Copa 2026">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>⚽ Copa do Mundo 2026</h1>
      <p>Acompanhe os jogos, registre resultados e visualize o chaveamento.</p>
      <div class="menu-app">
        <button id="btnMenuApp" class="btn-menu-app" aria-label="Abrir menu de opções">
          ☰
        </button>

        <div id="opcoesMenuApp" class="opcoes-menu-app">
            <button id="btnExportarDados" type="button">📤 Exportar backup</button>
            <button id="btnImportarDados" type="button">📥 Importar backup</button>
            <button id="btnAlternarTema" type="button">🌙 Modo escuro</button>
            <button id="btnConsultarResultados" type="button">🔎 Consultar Resultados</button>
            <button id="btnResetarTorneio" type="button" class="opcao-perigo">🗑️ Limpar resultados</button>

            <input
                type="file"
                id="inputImportarBackup"
                accept=".json"
                style="display:none;"
            >
        </div>
      </div>
    </div>
  </header>

  <nav class="fase-controle" aria-label="Controle de fases da competição">
    <button id="btnFaseAnterior" type="button" onclick="mudarFase(-1)" class="btn-fase" aria-label="Ir para a fase anterior">← Fase Anterior</button>
    <h2 id="faseTitulo">Fase de Grupos</h2>
    <button id="btnFaseProxima" type="button" onclick="mudarFase(1)" class="btn-fase" aria-label="Ir para a próxima fase">Próxima Fase →</button>
  </nav>

  <main class="container" role="main">
    <section class="grupos" id="grupos" aria-labelledby="tituloGrupos">
      <div class="classification-header">
        <h2 id="tituloGrupos">📊 Classificação por Grupo</h2>
        
        <div class="legenda-classificacao">
          <span><i class="legenda-cor classificado"></i> Classificado</span>
          <span><i class="legenda-cor eliminado"></i> Eliminado</span>
        </div>
      </div>
      <div id="gruposContainer"></div>
    </section>

    <aside class="painel-lateral" aria-label="Painel de jogos da fase de grupos">
      <section class="jogos" aria-labelledby="rodadaTitulo">
        <div class="rodada-header">
          <button id="btnRodadaAnterior" type="button" class="btn-navegar" aria-label="Rodada anterior">← Anterior</button>
          <h2 id="rodadaTitulo">📅 Rodada 1</h2>
          <button id="btnRodadaProxima" type="button" class="btn-navegar" aria-label="Próxima rodada">Próxima →</button>
        </div>
        <div id="jogosList" class="lista-jogos" aria-live="polite"></div>
      </section>
    </aside>
  </main>

  <section id="faseMataMata" class="fase-mata-mata" hidden aria-labelledby="faseTitulo">
    <div id="chaveamentoContainer" class="grid-mata-mata"></div>
  </section>

  <section id="resumoFinal" class="resumo-final" style="display: none;"></section>

  <footer class="footer">
    <p>&copy; 2026 Tabela Copa do Mundo | Dev jVSM iNC</p>
  </footer>

  <script src="script.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js')
                .then(() => console.log('Service Worker registrado'))
                .catch(error => console.error('Erro ao registrar Service Worker:', error));
        });
    }
  </script>
</body>
</html>
