<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Resultados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="pagina-resultados">

    <header class="cabecalho-resultados">
        <h1>🔎 Consulta de Resultados</h1>
        <p>
            Consulte os resultados oficiais dos jogos da Copa do Mundo 2026
            para preencher sua tabela.
        </p>
    </header>

    <section class="cards-fontes">

        <a class="card-fonte"
           href="https://www.fifa.com/pt/tournaments/mens/worldcup/canadamexicousa2026/scores-fixtures?country=BR&wtw-filter=ALL"
           target="_blank">
            <div class="icone-fonte">🌎</div>
            <h2>FIFA</h2>
            <p>Site oficial da Copa do Mundo.</p>
        </a>

        <a class="card-fonte"
           href="https://www.flashscore.com.br/futebol/mundo/copa-do-mundo/"
           target="_blank">
            <div class="icone-fonte">⚽</div>
            <h2>Flashscore</h2>
            <p>Resultados em tempo real.</p>
        </a>

        <a class="card-fonte"
           href="https://www.google.com/search?q=copa+do+mundo+2026+resultados"
           target="_blank">
            <div class="icone-fonte">🔍</div>
            <h2>Google</h2>
            <p>Pesquisa rápida de partidas.</p>
        </a>

    </section>

</div>

</body>
</html>
